<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Monthiversary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- VAULT -->
  <div id="s-vault" class="screen active">
    <div class="vault-card">
      <span class="key-icon">🔑</span>
      <div class="vault-title">Our Secret</div>
      <div class="vault-sub">Enter the digits to unlock the vault</div>

      <div class="digit-row">
        <input class="dbox" id="d0" maxlength="1">
        <input class="dbox" id="d1" maxlength="1">
        <input class="dbox" id="d2" maxlength="1">
        <input class="dbox" id="d3" maxlength="1">
      </div>

      <button class="unlock-btn" onclick="checkCode()">UNLOCK</button>
      <div class="clue-link" onclick="showClue()">Need a clue?</div>
      <div class="err-msg" id="vaultMsg"></div>
    </div>
  </div>

  <!-- MEMORY -->
  <div id="s-memory" class="screen">
    <div class="mem-title">Fragments of Us</div>
    <div class="mem-sub" id="memSub">Matches: 0 / 8</div>
    <div class="match-dots" id="matchDots"></div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- POPUP -->
  <div id="s-popup" class="screen">
    <div class="popup-card">
      <div class="popup-title">You won ✨</div>
      <div class="popup-msg">i figured you would...</div>
      <button class="cont-btn" onclick="startWords()">CONTINUE</button>
    </div>
  </div>

  <!-- HIDDEN WORDS -->
  <div id="s-words" class="screen">
    <div class="hw-title">Hidden Words</div>
    <div class="found-badge">Found: <span id="foundCount">0</span> / 6</div>
    <div class="word-grid" id="wordGrid"></div>
  </div>

  <!-- LETTER -->
  <div id="s-letter" class="screen">
    <span class="env-icon" onclick="openLetter()">💌</span>
    <div class="letter-card" id="letterCard">
      <h3>Hi...</h3>
      <p>Thanks for everything ❤️</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
